        Slow Image (4s)
    </div>
</sly>
<sly data-sly-test="${wcmmode.disabled}">
    <sly data-sly-use.model="com.aemcomponentperf.core.models.SlowImageModel"/>

        <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
             width="800" height="450" alt="Slow Image (4s backend delay)"/>
    </div>
</sly>
